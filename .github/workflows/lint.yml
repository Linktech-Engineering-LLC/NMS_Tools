name: Lint and Static Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          pip install flake8 black isort yamllint

      - name: Run flake8 (non-blocking)
        run: |
          echo "Running flake8..."
          flake8 || true

      - name: Run black (check only, non-blocking)
        run: |
          echo "Running black..."
          black --check . || true

      - name: Run isort (check only, non-blocking)
        run: |
          echo "Running isort..."
          isort --check-only . || true

      - name: Run yamllint (non-blocking)
        run: |
          echo "Running yamllint..."
          yamllint . || true

      - name: Run shellcheck (non-blocking)
        run: |
          echo "Running shellcheck..."
          shellcheck **/*.sh || true
