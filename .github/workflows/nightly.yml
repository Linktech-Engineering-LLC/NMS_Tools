name: Nightly Build

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC nightly
  workflow_dispatch:       # allow manual runs

jobs:
  nightly-build:
    runs-on: ubuntu-latest

    env:
      NIGHTLY: "1"   # <<< ENABLE NIGHTLY VERSION STAMPING

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            python3 \
            rpm \
            dpkg-dev

      - name: Build DEB and RPM via Makefile
        run: |
          make packages

      - name: Collect DEB artifact
        if: always()
        run: |
          mkdir -p artifacts
          cp packaging/debian/*.deb artifacts/ || true

      - name: Collect RPM artifacts
        if: always()
        run: |
          mkdir -p artifacts
          find "$HOME/rpmbuild/RPMS" -type f -name "*.rpm" -exec cp {} artifacts/ \; || true


  publish-dashboard:
    runs-on: ubuntu-latest
    needs: nightly-build

    env:
      NIGHTLY: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download nightly artifacts
        uses: actions/download-artifact@v4
        with:
          name: nightly-nms-tools
          path: artifacts

      - name: Extract version metadata
        id: meta
        run: |
          VERSION=$(ls artifacts | sed -n 's/.*nms-tools_\(.*\)\.deb/\1/p')
          DATESTAMP=$(echo "$VERSION" | cut -d+ -f2 | cut -d. -f1)
          GIT_HASH=$(echo "$VERSION" | sed 's/.*git//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "datestamp=$DATESTAMP" >> $GITHUB_OUTPUT
          echo "hash=$GIT_HASH" >> $GITHUB_OUTPUT

      - name: Generate dashboard HTML
        run: |
          mkdir -p dashboard
          cat > dashboard/index.html <<EOF
          <html>
          <head><title>NMS_Tools Nightly Dashboard</title></head>
          <body>
          <h1>NMS_Tools Nightly Dashboard</h1>
          <p><strong>Version:</strong> ${VERSION}</p>
          <p><strong>Build Date:</strong> ${DATESTAMP}</p>
          <p><strong>Commit:</strong> ${GIT_HASH}</p>
          <h2>Downloads</h2>
          <ul>
            <li><a href="nms-tools_${VERSION}.deb">DEB Package</a></li>
            <li><a href="nms_tools-${VERSION}-1.noarch.rpm">RPM Package</a></li>
          </ul>
          </body>
          </html>
          EOF

          cp artifacts/*.deb dashboard/
          cp artifacts/*.rpm dashboard/

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dashboard
